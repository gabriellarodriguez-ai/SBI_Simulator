<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Feedback Simulator: SBI Framework</title>
    <style>
        /* --- BRAND VARIABLES --- */
        :root {
            --brand-blue: #4F50FF;       /* Hot Blue: Buttons, main border, headers */
            --brand-pink: #ECCEFF;       /* Cool Pink: Speech bubble background */
            --brand-black: #1F0D05;      /* Warm Black: High-contrast text */
            --brand-white: #ffffff;      /* Regular White: Main scenario card background */
            --brand-terracotta: #DB4D15; /* Terracotta: Action callouts and debrief footer */
            --page-bg: #e8e6df;          /* Slightly deeper tint for outer page background */
        }

        body {
            font-family: 'TT Commons', 'Segoe UI', sans-serif;
            font-weight: 500; /* Sets body copy to TT Commons Medium */
            background-color: var(--page-bg);
            color: var(--brand-black);
            line-height: 1.4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        #scenario-container {
            background: var(--brand-white);
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(31, 13, 5, 0.06);
            max-width: 760px;
            width: 100%;
            border-top: 8px solid var(--brand-blue);
            box-sizing: border-box;
        }

        /* Logo Header */
        .brand-header {
            text-align: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--brand-pink);
        }
        
        .brand-logo {
            max-width: 280px; /* Scaled up to let the layout and subtitle text remain legible */
            width: 100%;       /* Ensures high responsiveness on smaller viewing screens */
            height: auto;
        }

        h2 {
            font-family: 'Parafina', 'Segoe UI', sans-serif;
            font-weight: bold;
            margin-top: 0;
            color: var(--brand-blue);
            font-size: 1.4rem;
            margin-bottom: 12px;
        }

        /* Layout for Character + Text */
        .stage {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: flex-start;
        }

        #character-image {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--brand-pink);
            background-color: var(--page-bg);
            flex-shrink: 0;
        }

        .text-content {
            flex: 1;
        }

        .scene-text {
            font-style: italic;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .dialogue {
            font-weight: 500; /* Reinforces TT Commons Medium within dialogue bubbles */
            color: var(--brand-black);
            padding: 10px 15px;
            background-color: var(--brand-pink);
            border-radius: 0 12px 12px 12px; 
            font-size: 0.95rem;
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            font-family: 'TT Commons', 'Segoe UI', sans-serif;
            font-weight: 500;
            background-color: var(--brand-blue);
            color: #ffffff;
            border: 2px solid transparent;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(79, 80, 255, 0.1);
        }

        button:hover {
            background-color: var(--brand-white);
            color: var(--brand-blue);
            border: 2px solid var(--brand-blue);
            transform: translateY(-1px);
            box-shadow: 0 5px 10px rgba(79, 80, 255, 0.15);
        }

        button:hover .action-text {
            color: var(--brand-blue);
        }

        .action-text {
            font-family: 'Parafina', 'Segoe UI', sans-serif;
            font-weight: 800;
            display: block;
            margin-bottom: 2px;
            color: var(--brand-pink);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        #debrief-section {
            display: none;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 2px dashed var(--brand-terracotta);
        }

        #debrief-section h2 {
            color: var(--brand-terracotta);
        }

        .restart-btn {
            margin-top: 12px;
            background-color: var(--brand-terracotta);
            text-align: center;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(219, 77, 21, 0.1);
        }
        
        .restart-btn:hover {
            background-color: var(--brand-white);
            border-color: var(--brand-terracotta);
            color: var(--brand-terracotta);
        }
    </style>
</head>
<body>

<div id="scenario-container">
    <div class="brand-header">
        <img src="https://lh3.googleusercontent.com/d/1DbJ0pXxVNoISL9OXujmIDFSIc4QgWJjq" alt="Leadership Core Logo" class="brand-logo">
    </div>

    <h2 id="frame-title">Loading...</h2>
    
    <div class="stage">
        <img id="character-image" src="" alt="Alex" referrerpolicy="no-referrer">
        <div class="text-content">
            <div id="scene-text" class="scene-text"></div>
            <div id="dialogue-text" class="dialogue"></div>
        </div>
    </div>

    <div id="choices-container" class="choices-container"></div>
    
    <div id="debrief-section">
        <h2>Simulation Debrief</h2>
        <div id="debrief-text"></div>
        <button class="restart-btn" onclick="startGame()">Restart Scenario</button>
    </div>
</div>

<script>
    // NARRATIVE DATA: Fictional SBI Framework Scenario (Alex = Female with Custom Character Image URLs)
    const storyData = {
        start: {
            title: "The Pre-Meeting Diagnostic",
            image: "alex_eager.png", // Eager
            scene: "You are sitting in a 1-on-1 huddle room with Alex, a talented graphic designer on your team. Over the past three weeks, she has missed delivery deadlines for three separate project campaigns by two days each, forcing the web development team to scramble. You want to use this meeting to reinforce the SBI Framework. Which diagnostic trap must you actively avoid?",
            dialogue: "Alex: 'Hey! I brought the updated mood boards for next month. I think the team is going to love them.'",
            choices: [
                { action: "Choice A (The Attack Diagnostic)", text: "You focus on fixing Alex's underlying attitude and personal work ethic.", target: "frame2a" },
                { action: "Choice B (The Praise Sandwich Diagnostic)", text: "You plan to bury the feedback between compliments so she stays happy.", target: "frame2b" },
                { action: "Choice C (The SBI Structural Check)", text: "You isolate the objective Situation, the observable Behavior, and the measurable Impact.", target: "frame2c" }
            ]
        },
        frame2a: {
            title: "The Flawed Focus on Personal Character",
            image: "alex_defensive.png", // Defensive
            scene: "You open the meeting by addressing Alex's character and overall motivation levels directly.",
            dialogue: "You: 'Alex, I need to talk to you about your work ethic. For the past few weeks, you've been acting pretty disorganized, and it feels like you're losing focus on your responsibilities.'\n\nAlex: (Frowns deeply, crossing her arms) 'Disorganized? My work ethic is fine. I'm putting in 45 hours a week trying to get these designs perfect. It's not my fault the project scope keeps shifting.'",
            choices: [
                { action: "Choice A1 (The Hammer)", text: "Double down on your assessment. 'Regardless of scope, you need to manage your time better. Missing deadlines makes you look unreliable.'", target: "endA1" },
                { action: "Choice A2 (The Hard Pivot)", text: "Acknowledge the pushback and try to steer back to objective facts. 'Let's step back, Alex. I shouldn't have called you disorganized. Let's look at the actual calendar dates instead.'", target: "endA2" }
            ]
        },
        frame2b: {
            title: "The Flawed Focus on the 'Praise Sandwich'",
            image: "alex_confused.png", // Confused
            scene: "You decide to soften the blow by sandwiching the critique between enthusiastic compliments.",
            dialogue: "You: 'Alex, your mood boards look absolutely gorgeous, you are so creative! I did notice a couple of things were turned in late recently, but honestly, your design eye is just unmatched. Keep up the amazing work!'\n\nAlex: (Smiles broadly, completely missing the critique) 'Oh, thank you so much! Yeah, I spend extra days polishing the details because I know how much you value high-quality visuals. I'll keep prioritizing perfection!'",
            choices: [
                { action: "Choice B1 (The Quick Sign-off)", text: "Let it go since the meeting ended on a positive note. 'Awesome, glad we're on the same page. Let's look at the next layout.'", target: "endB1" },
                { action: "Choice B2 (The Frustrated Correction)", text: "Realize she completely missed the point and interrupt. 'Wait, Alex. I think you misunderstood. The extra days are actually hurting our launch timeline.'", target: "endB2" }
            ]
        },
        frame2c: {
            title: "The Core Framework Focus (The SBI Path)",
            image: "alex_attentive.png", // Attentive
            scene: "You lead with an objective, structured SBI statement. You completely separate her character from her observable workspace behaviors.",
            dialogue: "You: 'Alex, during the last three campaign launches [Situation], the final design assets were delivered two days after our scheduled deadlines [Behavior]. Because of those delays, the web development team had to work overtime over the weekend to make the live launch [Impact]. Let's talk about what's stalling the handoffs.'\n\nAlex: (Pauses, looking attentive) 'Oh... I didn't realize the web devs had to work the weekend. Honestly, the copywriter has been giving me the final text assets late, which pushes my whole timeline back. I felt stuck.'",
            choices: [
                { action: "Choice C1 (The Hands-off Directive)", text: "Tell Alex to fix it independently. 'You need to coordinate with the copywriter directly to solve that, then. Let's keep things on track next week.'", target: "endC1" },
                { action: "Choice C2 (The Collaborative Fix)", text: "Propose a structured, operational compromise. 'Let's pull the copywriter in for a quick huddle tomorrow so we can establish a formal, mid-week milestone for text handoffs.'", target: "endC2" }
            ]
        },
        endA1: {
            title: "Compliance & Emotional Disengagement",
            image: "alex_shutDown.png", // Shut Down
            scene: "Alex's open demeanor completely vanishes. She sighs heavily, looking down at the table.",
            dialogue: "Alex: 'Fine. I'll just turn in whatever I have on the due date, even if the copy isn't ready. Understood.'",
            result: "Alex complies out of fear but loses all passion for creative quality. By attacking character instead of behavior, you created a toxic, defensive environment and destroyed psychological safety.",
            debrief: "Attacking a learner's character triggers immediate biological defensiveness. A structured feedback model must always focus on objective, observable behavior, not subjective interpretations of personality."
        },
        endA2: {
            title: "The Clunky Operational Recovery",
            image: "alex_guarded.png", // Guarded
            scene: "Alex nods slowly, remaining professional but visibly guarded throughout the rest of the meeting.",
            dialogue: "Alex: 'Okay. I appreciate that. Let's just look at the dates then.'",
            result: "You successfully salvaged the operational data points, but the initial character attack damaged your coaching relationship. You will have to work harder next month to rebuild trust.",
            debrief: "While you correctly backpedaled to objective facts, leading with a subjective evaluation first fractured trust. Protecting trust from the very first sentence prevents meeting friction."
        },
        endB1: {
            title: "The Accountability Wall",
            image: "https://placehold.co/120x120/db4d15/ffffff?text=Slack+Alert", // Uses Terracotta for warning accent
            scene: "You wrap up the meeting with smiles. Three days later, the web development lead sends you an urgent message: the next campaign assets are late again, and the team is furious.",
            dialogue: "Slack Message: 'Hey, Alex just told us assets will be 48 hours late again because they need extra polish. Didn't you talk to her?'",
            result: "Because you hid the core critique inside a 'praise sandwich,' Alex left the meeting genuinely believing that taking extra time to polish assets was highly praised behavior.",
            debrief: "The 'Praise Sandwich' creates systemic ambiguity. Learners often remember only the praise, entirely filtering out the constructive critique. To build long-term retention, keep feedback separate, direct, and structurally clear."
        },
        endB2: {
            title: "The Frustrated Dialogue Pivot",
            image: "alex_frustrated.png", // Frustrated
            scene: "Alex stops smiling, looking deeply confused and visibly annoyed by the sudden shift in your message.",
            dialogue: "Alex: 'Wait... you just said my mood boards were unmatched and to keep doing what I'm doing. Now you're telling me I'm hurting the team? Which one is it?'",
            result: "You successfully pivoted back to the impact, but because your delivery structure was contradictory, she leaves feeling micro-managed and manipulated by mixed signals.",
            debrief: "Mixed messaging damages leader credibility. When you wordsmith feedback to be overly soft, you spend extra time correcting the confusion you generated. State the core message cleanly from the start."
        },
        endC1: {
            title: "The Analysis Paralysis Delay",
            image: "alex_overwhelmed.png", // Overwhelmed
            scene: "Alex closes her notebook slowly, looking visibly overwhelmed by the task of managing cross-functional dependencies alone.",
            dialogue: "Alex: 'Okay... I'll try to talk to the copywriter. I don't really have authority over their schedule, but I'll see what I can do.'",
            result: "Because she lacks the organizational authority to shift the copywriter's schedule, Alex gets stuck in a bottleneck, delays the next project, and the operational momentum is lost.",
            debrief: "Simply assigning a problem back to a beginner when they hit an upstream dependency leads to paralysis. As a manager, you must provide systemic scaffolding to help them unblock the bottleneck."
        },
        endC2: {
            title: "The High-Impact Framework Transformation",
            image: "alex_inspired.png", // Inspired
            scene: "Alex's eyes light up, and she immediately flips to a clean page in her notebook to outline a new timeline.",
            dialogue: "Alex: 'That would be incredibly helpful! If I get the copy text by Tuesday afternoon, I can comfortably lock handoffs to the web devs by Thursday morning without anyone working weekends.'",
            result: "Superb coaching! By cleanly outlining the Situation, Behavior, and Impact, you unzipped a healthy dialogue that identified the root cause. You co-created a real operational fix for $0.",
            debrief: "Outstanding! This path succeeds because your structured SBI statement removed judgment, which kept her mind out of fight-or-flight defense mode. This allowed both of you to focus on collaborative execution."
        }
    };

    // --- TEMPLATE ENGINE ---
    const titleEl = document.getElementById('frame-title');
    const imageEl = document.getElementById('character-image');
    const sceneEl = document.getElementById('scene-text');
    const dialogueEl = document.getElementById('dialogue-text');
    const choicesEl = document.getElementById('choices-container');
    const debriefSection = document.getElementById('debrief-section');
    const debriefText = document.getElementById('debrief-text');

    function goToNode(nodeId) {
        const node = storyData[nodeId];
        
        titleEl.innerText = node.title;
        imageEl.src = node.image; 
        sceneEl.innerText = node.scene;
        dialogueEl.innerText = node.dialogue;
        
        choicesEl.innerHTML = '';
        debriefSection.style.display = 'none';

        if (node.result) {
            const resultPara = document.createElement('p');
            resultPara.innerHTML = `<strong>Result:</strong> ${node.result}`;
            choicesEl.appendChild(resultPara);

            debriefSection.style.display = 'block';
            debriefText.innerHTML = `<p>${node.debrief}</p>`;
        } else {
            node.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerHTML = `<span class="action-text">${choice.action}</span> ${choice.text}`;
                btn.onclick = () => goToNode(choice.target);
                choicesEl.appendChild(btn);
            });
        }
    }

    function startGame() {
        goToNode('start');
    }

    startGame();
</script>

</body>
</html>
